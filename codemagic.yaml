# Codemagic CI — bygger iOS-skalet (Capacitor) och laddar upp till TestFlight.
# Förutsätter: App Store Connect-integration i Codemagic (Team settings → Integrations)
# och bundle-id se.foilio.app registrerat i Developer-portalen (det är det — appen finns
# i App Store Connect). ios/ är INTE incheckat → genereras med `cap add ios` i bygget.
workflows:
  ios-testflight:
    name: Foilio iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: foilio-asc        # namnet du ger integrationen i Codemagic-UI
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing        # innehåller CERTIFICATE_PRIVATE_KEY (Codemagic-UI, Secure)
      vars:
        # Appen öppnar direkt på Utforska (ingen blink av marknadsförings-startsidan).
        CAP_SERVER_URL: "https://www.foilio.se/produkter"
        BUNDLE_ID: "se.foilio.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Installera deps
        script: npm ci --legacy-peer-deps
      - name: Generera iOS-projektet
        script: |
          exec > >(tee "$CM_BUILD_DIR/gen-ios.log") 2>&1
          set -ex
          # cap add genererar ios/ men dess pod install fallerar (RevenueCat-podden
          # kräver iOS 15.0, Capacitor genererar 13.0) → || true, vi fixar target nedan.
          ./node_modules/.bin/cap add ios || true
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/" ios/App/Podfile
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/App/App.xcodeproj/project.pbxproj
          # Stäng av WKWebView-studsen (iOS rubber-band) — ingen Capacitor-config finns.
          sed -i '' 's|// Override point for customization after application launch.|UIScrollView.appearance().bounces = false|' ios/App/App/AppDelegate.swift
          (cd ios/App && pod install)
      - name: Sätt build-nummer
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Kodsignering (auto via App Store Connect API-nyckel)
        script: |
          exec > >(tee "$CM_BUILD_DIR/sign.log") 2>&1
          set -x
          keychain initialize
          # Apple ger inte privata nyckeln för befintliga cert → vi förser en egen;
          # --create skapar (och återanvänder) ett distributions-cert från den.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Bygg IPA
        script: |
          exec > >(tee "$CM_BUILD_DIR/build-ipa.log") 2>&1
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - gen-ios.log
      - sign.log
      - build-ipa.log
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
