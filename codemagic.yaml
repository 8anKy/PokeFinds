# Codemagic CI — bygger iOS-skalet (Capacitor) och laddar upp till TestFlight.
# Förutsätter: App Store Connect-integration i Codemagic (Team settings → Integrations)
# och bundle-id se.foilio.app registrerat i Developer-portalen (det är det — appen finns
# i App Store Connect). ios/ är INTE incheckat → genereras med `cap add ios` i bygget.
workflows:
  ios-testflight:
    name: Foilio iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: foilio-asc        # namnet du ger integrationen i Codemagic-UI
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing        # innehåller CERTIFICATE_PRIVATE_KEY (Codemagic-UI, Secure)
      vars:
        # Appen öppnar direkt på Utforska (ingen blink av marknadsförings-startsidan).
        CAP_SERVER_URL: "https://www.foilio.se/produkter"
        BUNDLE_ID: "se.foilio.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Installera deps
        script: npm ci --legacy-peer-deps
      - name: Generera iOS-projektet
        script: |
          exec > >(tee "$CM_BUILD_DIR/gen-ios.log") 2>&1
          set -ex
          # cap add genererar ios/ men dess pod install fallerar (RevenueCat-podden
          # kräver iOS 15.0, Capacitor genererar 13.0) → || true, vi fixar target nedan.
          ./node_modules/.bin/cap add ios || true
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/" ios/App/Podfile
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/App/App.xcodeproj/project.pbxproj
          # Fixa headern som glider NER efter scroll: WKWebView lägger automatiskt
          # på top-contentInset för safe-area (default .automatic) OVANPÅ vår CSS
          # padding-top: env(safe-area-inset-top) → dubbel topp efter första scroll.
          # .never = stäng av auto-inseten, vår CSS sköter notchen. Nollar även bounce.
          # CSS/JS kan INTE röra detta (native scrollView). Walka från windows.
          perl -0pi -e 's/func applicationDidBecomeActive\(_ application: UIApplication\) \{/func applicationDidBecomeActive(_ application: UIApplication) {\n        func killBounce(_ v: UIView) {\n            if let sv = v as? UIScrollView { sv.contentInsetAdjustmentBehavior = .never; sv.bounces = false; sv.alwaysBounceVertical = false }\n            v.subviews.forEach(killBounce)\n        }\n        application.windows.forEach(killBounce)\n        DispatchQueue.main.asyncAfter(deadline: .now() + 1) { application.windows.forEach(killBounce) }/' ios/App/App/AppDelegate.swift
          # Misslyckas högt om injektet inte tog (mall ändrad) → slipp falsk patch.
          grep -q killBounce ios/App/App/AppDelegate.swift
          # Kamera (skanna kort): WKWebView DÖLJER navigator.mediaDevices.getUserMedia
          # om Info.plist saknar NSCameraUsageDescription → appen visar "Kamera stöds
          # inte här". Lägg till usage-strings (Add faller om nyckeln finns → Set).
          PL=ios/App/App/Info.plist
          CAM='Foilio använder kameran för att skanna dina Pokémon-kort.'
          PHOTO='Foilio öppnar bildbiblioteket så att du kan välja en kortbild att skanna.'
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string \"$CAM\"" "$PL" || \
            /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription \"$CAM\"" "$PL"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string \"$PHOTO\"" "$PL" || \
            /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription \"$PHOTO\"" "$PL"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PL"
          (cd ios/App && pod install)
      - name: Sätt build-nummer
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Kodsignering (auto via App Store Connect API-nyckel)
        script: |
          exec > >(tee "$CM_BUILD_DIR/sign.log") 2>&1
          set -x
          keychain initialize
          # Apple ger inte privata nyckeln för befintliga cert → vi förser en egen;
          # --create skapar (och återanvänder) ett distributions-cert från den.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Bygg IPA
        script: |
          exec > >(tee "$CM_BUILD_DIR/build-ipa.log") 2>&1
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - gen-ios.log
      - sign.log
      - build-ipa.log
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
