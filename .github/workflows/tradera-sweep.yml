name: Tradera-svep (dagligen)

# Hämtar Tradera-annonser via det officiella SOAP-API:t en gång per dygn
# (6 separata kvoter = 600 anrop/dygn). Körs i molnet — datorn behöver inte vara på.
on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC dagligen
  workflow_dispatch: {}

concurrency:
  group: tradera-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TRADERA_APP_ID: ${{ secrets.TRADERA_APP_ID }}
      TRADERA_APP_KEY: ${{ secrets.TRADERA_APP_KEY }}
    steps:
      # Self-healing-vakt: hoppa över grönt tills DATABASE_URL-secret finns
      # (molnhosting konfigurerad). Inga misslyckade-mejl innan dess.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/tradera-full-sweep.ts
