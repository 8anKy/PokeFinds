name: Full insamling (dagligen)

# Ett komplett insamlingspass: alla aktiva butiks-skrapor + CM-prisguide +
# priscache-omräkning + alert-utskick. Dagligen (inte var 8:e h som lokalt) för
# att inte krocka med Tradera-svepets dygnskvot. Ser du Tradera-kvotvarningar:
# avaktivera detta jobb eller Tradera-källan så bara tradera-sweep.yml når Tradera.
on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC dagligen
  workflow_dispatch: {}

concurrency:
  group: scrape-all
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Full insamling (alla källor). Körtid 20–38 min och växer med katalogen →
    # 50 var i underkant. Daglig cron → ingen krock. Publikt repo = gratis minuter.
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10" # större Prisma-pool → mapPool-samtidighet utan pool_timeout
      # Auto-importens gränsfalls-dom (Haiku, ören/dygn) — attach istället för dubblettstub.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }} # utan denna mailas inga alerts (mailer går i console-mode)
      # APNs (iOS push). Utan APNS_KEY blir sendPush en no-op → bara mejl, ingen pushnotis.
      APNS_KEY: ${{ secrets.APNS_KEY }}
      APNS_KEY_ID: SMQBU7MM82
      APNS_TEAM_ID: F2XP44FF3B
      APNS_BUNDLE_ID: se.foilio.app
      APNS_PRODUCTION: "true"
      TRADERA_APP_ID: ${{ secrets.TRADERA_APP_ID }}
      TRADERA_APP_KEY: ${{ secrets.TRADERA_APP_KEY }}
      CARDMARKET_RAPIDAPI_HOST: ${{ secrets.CARDMARKET_RAPIDAPI_HOST }}
      CARDMARKET_RAPIDAPI_KEY: ${{ secrets.CARDMARKET_RAPIDAPI_KEY }}
    steps:
      # Self-healing-vakt: hoppa över grönt tills DATABASE_URL-secret finns
      # (molnhosting konfigurerad). Inga misslyckade-mejl innan dess.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/scrape-all-run.ts
