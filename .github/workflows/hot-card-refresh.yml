name: Hot-card-priser (2×/dygn)

# Uppdaterar From-priset för de mest bevakade/visade korten två gånger per dygn
# (utöver den dagliga fulla refreshen 05:00) → intradags-färska priser på korten
# folk tittar på. ~HOT_CARD_LIMIT anrop/körning → ryms i RapidAPI-kvotens slack.
on:
  schedule:
    - cron: "0 13,21 * * *" # 13:00 + 21:00 UTC (förskjutet från full refresh 05:00)
  workflow_dispatch: {} # manuell "Run workflow"-knapp

concurrency:
  group: hot-card-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10"
      CARDMARKET_RAPIDAPI_HOST: ${{ secrets.CARDMARKET_RAPIDAPI_HOST }}
      CARDMARKET_RAPIDAPI_KEY: ${{ secrets.CARDMARKET_RAPIDAPI_KEY }}
      EUR_SEK: ${{ secrets.EUR_SEK }}
      HOT_CARD_LIMIT: "400" # ~400 anrop/körning × 2 = 800/dygn (full refresh ~1100)
    steps:
      # Self-healing-vakt: hoppa över grönt tills DATABASE_URL-secret finns.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/hot-card-refresh-run.ts
