name: CM-historik backfill (engångs, flera dagar)

# Backfillar ÄKTA daglig CardMarket-prishistorik via /pokemon/cards/history.
# mode=describe → dumpar råsvaret för 1 kort (verifiera formen FÖRST, inga skrivningar).
# mode=apply    → skriver historik (populärast först, resumerbar, MAX_CALLS/körning).
# Körs manuellt (workflow_dispatch) eller dagligen 23:30 UTC (efter övriga jobb →
# tar kvar-kvoten) tills katalogen är ifylld; avaktivera schemat när klart.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "describe (verifiera form) eller apply (skriv)"
        type: choice
        options: [describe, apply]
        default: describe
      max_calls:
        description: "max API-anrop denna körning"
        default: "1000"
  schedule:
    - cron: "30 23 * * *" # 23:30 UTC dagligen — efter dagens övriga jobb

concurrency:
  group: cm-history-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10"
      CARDMARKET_RAPIDAPI_HOST: ${{ secrets.CARDMARKET_RAPIDAPI_HOST }}
      CARDMARKET_RAPIDAPI_KEY: ${{ secrets.CARDMARKET_RAPIDAPI_KEY }}
      EUR_SEK: ${{ secrets.EUR_SEK }}
    steps:
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting är konfigurerad."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        name: Kör backfill
        run: npx tsx scripts/backfill-cm-history.ts
        env:
          # Schemalagd körning (ingen input) = apply. Manuell = vald mode.
          DESCRIBE: ${{ github.event.inputs.mode == 'describe' && '1' || '0' }}
          APPLY: ${{ (github.event.inputs.mode == 'apply' || github.event_name == 'schedule') && '1' || '0' }}
          MAX_CALLS: ${{ github.event.inputs.max_calls || '1000' }}
