name: Restock-bevakning (var 4:e timme)

# Kör de restock-bevakade svenska butikerna och skickar restock-alerts vid
# lagerövergång (slut -> i lager). Var 4:e timme: varje körning håller Neons
# compute igång ~30–90 min, så tätare cron lät den aldrig skala till noll och
# brände CU-hrs. 6 körningar/dygn räcker gott för en hobby. Vill du tätare:
# dra ned intervallet igen (Actions-minuter är gratis på publikt repo; Neon-CU
# är flaskhalsen).
on:
  schedule:
    - cron: "0 */4 * * *" # var 4:e timme
  workflow_dispatch: {}

concurrency:
  group: restock-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    # 9 butiker skrapas sekventiellt ~28–40 min → 40 var för snävt (jobbet dödades
    # mitt i loopen, hoppade resterande butiker OCH den avslutande
    # dispatchPendingAlerts → inga alerts den cykeln). Publikt repo = obegränsade
    # Actions-minuter, så generös marginal är gratis. 90 < 120 (2h-cron) → krockar
    # aldrig med nästa körning. ponytail: höj taket; parallellisera butikerna
    # (mapPool) först om listan växer så mycket att 90 min inte räcker.
    timeout-minutes: 90
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10" # större Prisma-pool → mapPool-samtidighet utan pool_timeout
    steps:
      # Self-healing-vakt: tills molnhostingen (Neon) är konfigurerad saknas
      # DATABASE_URL-secret. Då hoppar vi över körningen och lyckas grönt (ingen
      # mejl-spam). Så fort secreten finns kör jobbet automatiskt på riktigt.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/restock-watch-run.ts
