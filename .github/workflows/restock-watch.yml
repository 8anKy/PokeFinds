name: Restock-bevakning (var 10:e minut)

# Lätt restock-skanning (runRestockScan): hämtar de restock-bevakade butikernas
# kataloger PARALLELLT (bara HTTP → Neon sover) och diffar sedan lagerstatus mot
# befintliga offers i en kort DB-burst. Skriver bara lagerövergångar (+ alerts).
# Täcker ALLA sealed-produkter butikerna säljer (singlar/marknadsplats-only =
# Cardmarket/Tradera, ej restockWatch-källor).
#
# Tätades 2026-07-03 från 30min → 10min för snabbare fångst inför stora drops (t.ex.
# 30-årsjubileumssetet). Kostar INTE mer Neon-compute: en ÄNDRINGSGRIND
# (RESTOCK_FINGERPRINT_FILE + feedFingerprint) väcker DB:n BARA när någon lagerstatus
# faktiskt flippat. Oförändrad feed = ren HTTP, Neon sover → merparten av de tätare
# körningarna rör aldrig DB:n. Avtrycket cachas mellan körningar via actions/cache.
# (Obs: GitHub schemalägger cron "best effort" — kan vara några min sena vid hög last.)
on:
  schedule:
    - cron: "*/10 * * * *" # var 10:e minut (ändringsgrind → Neon väcks bara vid ändring)
  workflow_dispatch: {}

concurrency:
  group: restock-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    # Parallell hämtning (mapPool) → körningen är HTTP-bunden men klar på ~60-65s
    # (mätt i produktion), långt under taket. Publikt repo = obegränsade Actions-minuter.
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10" # större Prisma-pool → mapPool-samtidighet utan pool_timeout
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }} # utan denna mailas inga alerts (mailer går i console-mode)
      # APNs (iOS push). Utan APNS_KEY blir sendPush en no-op → bara mejl, ingen pushnotis.
      APNS_KEY: ${{ secrets.APNS_KEY }}
      APNS_KEY_ID: SMQBU7MM82
      APNS_TEAM_ID: F2XP44FF3B
      APNS_BUNDLE_ID: se.foilio.app
      APNS_PRODUCTION: "true"
      # Ändringsgrind: feed-avtrycket sparas här och cachas mellan körningar (nedan).
      # Oförändrad feed → DB-fasen hoppas → Neon sover → tätare takt utan mer compute.
      RESTOCK_FINGERPRINT_FILE: .restock-cache/fingerprint.txt
    steps:
      # Self-healing-vakt: tills molnhostingen (Neon) är konfigurerad saknas
      # DATABASE_URL-secret. Då hoppar vi över körningen och lyckas grönt (ingen
      # mejl-spam). Så fort secreten finns kör jobbet automatiskt på riktigt.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      # Feed-avtrycket från förra körningen (ändringsgrind). Rullande nyckel: sparas
      # under run_id (unik → kan alltid skrivas), restore-keys hämtar senaste tidigare.
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: .restock-cache
          key: restock-fp-${{ github.run_id }}
          restore-keys: |
            restock-fp-
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/restock-watch-run.ts
