name: Restock-bevakning (varannan timme)

# Lätt restock-skanning (runRestockScan): hämtar de restock-bevakade butikernas
# kataloger PARALLELLT (bara HTTP → Neon sover) och diffar sedan lagerstatus mot
# befintliga offers i en kort DB-burst. Skriver bara lagerövergångar (+ alerts) —
# inga pris-/observationsskrivningar. Därför håller den knappt Neon vaken (jfr den
# gamla tunga loopen som höll compute igång ~40 min och tvingade fram 4h-takt), så
# vi kör nu VARJE TIMME inom Neon free-tier. Täcker ALLA sealed-produkter butikerna
# säljer (singlar/marknadsplats-only = Cardmarket/Tradera, ej restockWatch-källor).
# Vill du tätare (t.ex. 30 min): bevaka Neon-compute — kan kräva betald plan.
on:
  schedule:
    - cron: "0 */2 * * *" # varannan timme (halverar Neon-uppvakningar vs varje timme; restocks fångas inom 2h)
  workflow_dispatch: {}

concurrency:
  group: restock-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    # Parallell hämtning (mapPool) → körningen är HTTP-bunden men klar långt under
    # taket. Publikt repo = obegränsade Actions-minuter. 30 < 60 (1h-cron) → ingen krock.
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10" # större Prisma-pool → mapPool-samtidighet utan pool_timeout
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }} # utan denna mailas inga alerts (mailer går i console-mode)
      # APNs (iOS push). Utan APNS_KEY blir sendPush en no-op → bara mejl, ingen pushnotis.
      APNS_KEY: ${{ secrets.APNS_KEY }}
      APNS_KEY_ID: SMQBU7MM82
      APNS_TEAM_ID: F2XP44FF3B
      APNS_BUNDLE_ID: se.foilio.app
      APNS_PRODUCTION: "true"
    steps:
      # Self-healing-vakt: tills molnhostingen (Neon) är konfigurerad saknas
      # DATABASE_URL-secret. Då hoppar vi över körningen och lyckas grönt (ingen
      # mejl-spam). Så fort secreten finns kör jobbet automatiskt på riktigt.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/restock-watch-run.ts
