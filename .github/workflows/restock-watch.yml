name: Restock-bevakning (var 2:e timme)

# Kör de restock-bevakade svenska butikerna och skickar restock-alerts vid
# lagerövergång (slut -> i lager). Var 2:a timme för att hålla GitHub Actions
# gratis-minuter (2000/mån privat repo). Vill du tätare alerts: gör repot
# publikt (obegränsade Actions) eller dra ned cron-intervallet.
on:
  schedule:
    - cron: "0 */2 * * *" # var 2:e timme
  workflow_dispatch: {}

concurrency:
  group: restock-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10" # större Prisma-pool → mapPool-samtidighet utan pool_timeout
    steps:
      # Self-healing-vakt: tills molnhostingen (Neon) är konfigurerad saknas
      # DATABASE_URL-secret. Då hoppar vi över körningen och lyckas grönt (ingen
      # mejl-spam). Så fort secreten finns kör jobbet automatiskt på riktigt.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/restock-watch-run.ts
