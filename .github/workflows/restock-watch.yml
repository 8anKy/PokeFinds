name: Restock-bevakning (var 10:e minut)

# Lätt restock-skanning (runRestockScan): hämtar de restock-bevakade butikernas
# kataloger PARALLELLT (bara HTTP → Neon sover) och diffar sedan lagerstatus mot
# befintliga offers i en kort DB-burst. Skriver bara lagerövergångar (+ alerts).
# Täcker ALLA sealed-produkter butikerna säljer (singlar/marknadsplats-only =
# Cardmarket/Tradera, ej restockWatch-källor).
#
# Kostar INTE mer Neon-compute: en ÄNDRINGSGRIND (RESTOCK_FINGERPRINT_FILE +
# feedFingerprint) väcker DB:n BARA när någon lagerstatus faktiskt flippat. Oförändrad
# feed = ren HTTP, Neon sover → merparten av körningarna rör aldrig DB:n. Avtrycket
# cachas mellan körningar via actions/cache.
#
# TRIGGER (2026-07-03): GitHub `schedule:`-cron är "best effort" och kördes i praktiken
# bara var 1,5–3,5 h (mätt) trots "*/10" → restocks kom timmar sent. workflow_dispatch
# fyrar däremot inom sekunder och throttlas INTE. Primär trigger är därför en extern
# cron (cron-job.org) som POST:ar till GitHub-API:t var 10:e minut:
#   POST https://api.github.com/repos/8anKy/PokeFinds/actions/workflows/restock-watch.yml/dispatches
#   headers: Authorization: Bearer <PAT (Actions: read+write)>, Accept: application/vnd.github+json
#   body: {"ref":"main"}
# `schedule:` nedan behålls BARA som gles reserv om pingern dör (den fyrar ändå ~1-2 h).
on:
  schedule:
    - cron: "0 * * * *" # RESERV — opålitlig (~1-2 h fördröjning). Riktig takt = pinger via workflow_dispatch.
  workflow_dispatch: {}

# DÖDA ALDRIG EN PÅGÅENDE SKANNING (cancel-in-progress: false). Med `true` kunde nästa
# ping avbryta en skanning MITT i lager-diffen. Skanningen larmar först och skriver den
# nya lagerstatusen sist, men ett avbrott mellan två annonser lämnar ändå halvfärdigt
# arbete — och en dödad körning sparar aldrig sitt feed-avtryck (actions/cache post-steg
# hoppas vid cancel), så nästa körning väcker Neon i onödan. Med `false` får den
# pågående köra klart; en ny ping ställer sig i kö och en ÄNNU nyare ping avbryter bara
# den KÖANDE (som aldrig hunnit röra DB:n) → ofarligt. Max 1 väntande, ingen pile-up.
concurrency:
  group: restock-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    # Parallell hämtning (mapPool) → körningen är HTTP-bunden men klar på ~60-65s
    # (mätt i produktion), långt under taket. Publikt repo = obegränsade Actions-minuter.
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10" # större Prisma-pool → mapPool-samtidighet utan pool_timeout
      # Auto-importens gränsfalls-dom (Haiku, ören/dygn) — attach istället för dubblettstub.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }} # utan denna mailas inga alerts (mailer går i console-mode)
      # APNs (iOS push). Utan APNS_KEY blir sendPush en no-op → bara mejl, ingen pushnotis.
      APNS_KEY: ${{ secrets.APNS_KEY }}
      APNS_KEY_ID: SMQBU7MM82
      APNS_TEAM_ID: F2XP44FF3B
      APNS_BUNDLE_ID: se.foilio.app
      APNS_PRODUCTION: "true"
      # Ändringsgrind: LAGERDIFF (src/lib/feed-state-diff.ts). Väcker Neon bara på
      # riktiga lagerflippar, inte på roterande butikers (Swepoke/Shinycards) URL-churn
      # — som annars flippade fingeravtrycket varje körning och höll computen vaken.
      # Statekartan cachas mellan körningar (nedan).
      RESTOCK_STATE_FILE: .restock-cache/state.json
      # SKARP grind sedan 2026-07-17: verifierad i skuggläge 2026-07-15..17 —
      # 0 [SHADOW-MISMATCH] över 445 körningar (grinden ville aldrig hoppa när en
      # restock faktiskt fanns). Nu hoppar den DB-fasen skarpt på oförändrad feed →
      # Neon somnar → compute sjunker (~$18→~$5/mån). Återgå till "1" om lagerdiff-
      # logiken (src/lib/feed-state-diff.ts) ändras och behöver ny skugg-verifiering.
      RESTOCK_GATE_SHADOW: "0"
    steps:
      # Self-healing-vakt: tills molnhostingen (Neon) är konfigurerad saknas
      # DATABASE_URL-secret. Då hoppar vi över körningen och lyckas grönt (ingen
      # mejl-spam). Så fort secreten finns kör jobbet automatiskt på riktigt.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      # Feed-avtrycket från förra körningen (ändringsgrind). Rullande nyckel: sparas
      # under run_id (unik → kan alltid skrivas), restore-keys hämtar senaste tidigare.
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: .restock-cache
          key: restock-fp-${{ github.run_id }}
          restore-keys: |
            restock-fp-
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/restock-watch-run.ts
