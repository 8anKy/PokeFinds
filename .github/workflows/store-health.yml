name: Butiks-hälsokoll (veckovis)

# Hämtar varje restock-bevakad butiksadapter och blir RÖD om någon returnerar 0
# produkter — en adapter som dött tyst (butik bytt plattform/HTML). Larm = GitHub
# mejlar repo-ägaren automatiskt vid röd körning; loggen namnger butiken. Lagar
# INTE adaptern (kräver en människa) — gör bara ett tyst flerveckorsutfall synligt
# inom 7 dagar. Läser bara butiksfeeds + en kort DB-läsning (källistan).
on:
  schedule:
    - cron: "0 6 * * 1" # måndagar 06:00 UTC
  workflow_dispatch: {}

concurrency:
  group: store-health
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # stub-dedupen (Haiku, ören/vecka)
    steps:
      # Samma vakt som restock-watch: utan DATABASE_URL hoppar vi över och lyckas
      # grönt (ingen falsk-röd/mejlspam innan molnhosting är konfigurerad).
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills Neon är konfigurerad."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/check-store-health.ts
      # Länk-revision: butiks-offers vars URL-slug motsäger produkttiteln (serienummer,
      # sifferset, språk). Fångar fel-länkar som matcher-vakterna inte kan laga i
      # efterhand (de vaktar bara NYA matchningar). Röd körning = mejl till ägaren.
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/audit-links.ts
      # GTIN-rapport: felaktiga butikslänkar (samma produkt, motstridiga streckkoder)
      # och katalogdubbletter (olika produkter, samma streckkod) — REN SQL, noll tokens.
      # Körs FÖRE stub-dedupen: streckkoden svarar gratis på den största par-klassen,
      # så LLM:en bara ser de par som faktiskt saknar kod. Läs-only, blir aldrig röd.
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/gtin-report.ts
      # CM-enkel-länk-rapport: sealed-produkter vars CM-offer pekar på en SINGEL (fel prisspår).
      # Fångar legacy-fellänkar som refreshens exakt-väg redan avvisar för NYA (men inte städar).
      # Se scripts/cm-single-link-report.ts (2026-07-17: 16 hittade+lagade, bl.a. Venusaur→Surfing Pikachu).
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/cm-single-link-report.ts
      # CM-länk-missmatch: sealed vars CM-idProduct FINNS men är FEL vara (spårar fel pris).
      # Titel↔CM-katalognamn-likhet. Informativ (kan ha falska positiva) — granska loggen.
      # Fångar det fuzzy-re-mismatch skapar (Water Stacking Tin→Tapu Lele, Meowth→Tyrantrum).
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/cm-link-mismatch-report.ts
      # Åtgärdar det rapporten hittar, men BARA det som är bevisbart: merga dubbletter där
      # ingen titelvakt protesterar, och omdirigera offers vars streckkod ägs av en annan
      # katalogprodukt. RADERAR ALDRIG något — majoritetsröstning bland butiker är INTE
      # sanning (sortiments-koder vinner omröstningen och skulle radera den korrekta länken).
      # Resten hamnar i rapporten + "Fel länk?"-kön för mänsklig granskning.
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/gtin-fix.ts --apply
      # Stub-dedup: auto-importens dubblettprodukter (olika butiksnamn på samma SKU)
      # merge:as LLM-verifierat (Haiku, två titlar/anrop). Se src/jobs/dedupe-stubs.ts.
      # Streckkods-identiska stubbar merge:as redan gratis inuti jobbet (gtinMerges).
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/dedupe-stubs-run.ts
