name: Cardmarket-priser (dagligen)

# Uppdaterar singel- + sealed-priser från CardMarket API TCG (RapidAPI) en gång
# per dygn. Körs i molnet via GitHub Actions — kräver INTE att datorn är på.
on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC — direkt efter RapidAPI-kvotens dagsreset (12:59 UTC) så fulla refreshen får färsk kvot först
  workflow_dispatch: {} # manuell "Run workflow"-knapp

concurrency:
  group: cardmarket-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Skriver dagens pris + historik (singlar + sealed). Körtid 23–46 min och en
    # körning dödades vid 50m → för snävt; en timeout mitt i = partiell historik.
    # Daglig cron (24h mellan körningar) → ingen krock. Publikt repo = gratis minuter.
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_POOL: "10" # större Prisma-pool → mapPool-samtidighet utan pool_timeout
      CARDMARKET_RAPIDAPI_HOST: ${{ secrets.CARDMARKET_RAPIDAPI_HOST }}
      CARDMARKET_RAPIDAPI_KEY: ${{ secrets.CARDMARKET_RAPIDAPI_KEY }}
      EUR_SEK: ${{ secrets.EUR_SEK }}
      # JP-sealed-auto-mappningens LLM-dom (Haiku, ören/dygn). Utan nyckel mappas
      # bara nära-exakta namn (≥0.9) — refresh av redan mappade JP funkar ändå.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      # Self-healing-vakt: hoppa över grönt tills DATABASE_URL-secret finns
      # (molnhosting konfigurerad). Inga misslyckade-mejl innan dess.
      - name: Förkrav — DATABASE_URL måste vara satt
        id: guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::notice::DATABASE_URL saknas — hoppar över tills molnhosting (Neon) är konfigurerad. Förväntat = grön körning."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --legacy-peer-deps
      - if: steps.guard.outputs.ready == 'true'
        run: npx prisma generate
      - if: steps.guard.outputs.ready == 'true'
        run: npx tsx scripts/cardmarket-refresh-run.ts
