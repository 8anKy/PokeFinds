<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PokeFinds</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #0a0a0c;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex; align-items: center; justify-content: center;
        text-align: center; padding: 24px;
      }
      .wrap { max-width: 380px; }
      .logo {
        width: 64px; height: 64px; margin: 0 auto 20px;
        border-radius: 16px; background: #141417;
        border: 1px solid #2a2a30;
        display: flex; align-items: center; justify-content: center;
      }
      .dot { width: 26px; height: 26px; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #5eead4, #2dd4bf 55%, #0f766e); }
      h1 { font-size: 20px; font-weight: 650; margin: 0 0 8px; letter-spacing: -0.01em; }
      p { font-size: 14px; line-height: 1.55; color: #a1a1aa; margin: 0 0 6px; }
      .spinner {
        margin: 22px auto 0; width: 26px; height: 26px;
        border: 2.5px solid #2a2a30; border-top-color: #2dd4bf;
        border-radius: 50%; animation: spin 0.9s linear infinite;
      }
      code { color: #2dd4bf; background: #141417; padding: 2px 6px; border-radius: 5px; font-size: 12px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo"><div class="dot"></div></div>
      <h1>PokeFinds</h1>
      <p id="msg">Ansluter till PokeFinds…</p>
      <p id="hint" style="display:none">
        Sätt <code>CAP_SERVER_URL</code> till din produktions-URL och kör
        <code>npx cap sync</code>. Se <code>docs/MOBILE.md</code>.
      </p>
      <div class="spinner" id="spin"></div>
    </div>
    <script>
      // Det här skalet visas bara om server.url inte är satt eller appen är offline.
      // När CAP_SERVER_URL är konfigurerad laddas den hostade appen direkt i stället.
      setTimeout(function () {
        document.getElementById("msg").textContent = "Ingen server-URL konfigurerad.";
        document.getElementById("hint").style.display = "block";
        document.getElementById("spin").style.display = "none";
      }, 4000);
    </script>
  </body>
</html>
